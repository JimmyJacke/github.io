<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    
    <!-- CSP mais permissivo para Android WebView -->
    <meta http-equiv="Content-Security-Policy" 
          content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob: filesystem: https: http:; 
                   script-src * 'unsafe-inline' 'unsafe-eval' https: http:; 
                   connect-src * https: http:; 
                   media-src * blob: data:;">
    
    <title>🎙️ Transcritor Offline</title>
    <style>
        :root { --bg: #f0f2f5; --card: #fff; --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --text: #1f2937; --warning: #f59e0b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: var(--card); width: 100%; max-width: 540px; padding: 24px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        h1 { text-align: center; margin-bottom: 20px; font-size: 1.5rem; color: var(--text); }
        .controls { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
        select, button { padding: 12px; border-radius: 10px; border: 1px solid #d1d5db; font-size: 15px; transition: 0.2s; }
        select { flex: 1; background: #fff; }
        button { cursor: pointer; font-weight: 500; border: none; color: #fff; }
        .btn-model { background: #6366f1; }
        .btn-model:disabled { background: #9ca3af; cursor: not-allowed; }
        .btn-record { flex: 1; background: var(--primary); }
        .btn-record:disabled { background: #9ca3af; }
        .btn-record.recording { background: var(--danger); }
        .btn-permission { background: var(--warning); color: #1f2937; width: 100%; margin-bottom: 10px; display: none; }
        .status { text-align: center; margin: 10px 0; font-size: 14px; color: #4b5563; min-height: 20px; }
        .status.error { color: var(--danger); font-weight: 500; }
        .status.warning { color: var(--warning); font-weight: 500; }
        .status.success { color: var(--success); font-weight: 500; }
        textarea { width: 100%; height: 160px; padding: 12px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 15px; line-height: 1.5; background: #f9fafb; resize: vertical; }
        .btn-download { width: 100%; margin-top: 10px; padding: 12px; background: var(--success); display: none; }
        .permission-help { font-size: 12px; color: #6b7280; margin-top: 8px; text-align: center; display: none; background: #fef3c7; padding: 8px; border-radius: 8px; }
        .retry-btn { background: #6366f1; margin-top: 10px; display: none; }
        @media (max-width: 420px) { .controls { flex-direction: column; } button { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Transcritor de Áudio Offline</h1>
        
        <button id="btnPermission" class="btn-permission">🔐 Conceder Permissão do Microfone</button>
        
        <div class="controls">
            <select id="langSelect">
                <option value="pt">🇧🇷 Português</option>
                <option value="en">🇺🇸 English</option>
            </select>
            <button id="btnModel" class="btn-model">⏳ Baixar Modelo</button>
        </div>
        
        <!-- Botão de retry para erros de conexão -->
        <button id="btnRetry" class="btn-model retry-btn">🔄 Tentar Novamente</button>
        
        <button id="btnRecord" class="btn-record" disabled>🎤 Iniciar Gravação</button>
        <div id="status" class="status">Carregue o modelo para começar.</div>
        <div id="permissionHelp" class="permission-help">
            💡 <strong>Android:</strong> Se o microfone não funcionar:<br>
            1️⃣ Configurações → Apps → [Seu App] → Permissões → Microfone → Permitir
        </div>
        
        <textarea id="output" placeholder="A transcrição aparecerá aqui..." readonly></textarea>
        <button id="btnDownload" class="btn-download">📥 Baixar Transcrição (.txt)</button>
    </div>

    <script type="module">
        // 🔄 Fallback para múltiplos CDNs em caso de ERR_SOCKET_NOT_CONNECTED
        const CDN_URLS = [
            'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2',
            'https://unpkg.com/@xenova/transformers@2.17.2',
            'https://cdn.skypack.dev/@xenova/transformers@2.17.2'
        ];
        
        let transcriber = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let audioCtx = null;
        let micPermissionGranted = false;
        let isAndroid = /Android/i.test(navigator.userAgent);
        let currentCdnIndex = 0;

        const els = {
            btnModel: document.getElementById('btnModel'),
            btnRecord: document.getElementById('btnRecord'),
            btnPermission: document.getElementById('btnPermission'),
            btnRetry: document.getElementById('btnRetry'),
            permissionHelp: document.getElementById('permissionHelp'),
            langSelect: document.getElementById('langSelect'),
            status: document.getElementById('status'),
            output: document.getElementById('output'),
            btnDownload: document.getElementById('btnDownload')
        };

        // 🔄 Função para carregar transformers.js com fallback de CDN
        async function loadTransformersLib() {
            while (currentCdnIndex < CDN_URLS.length) {
                try {
                    const url = CDN_URLS[currentCdnIndex];
                    els.status.textContent = `📡 Conectando ao servidor ${currentCdnIndex + 1}/${CDN_URLS.length}...`;
                    
                    // Importa dinamicamente com timeout
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 15000); // 15s timeout
                    
                    const { pipeline } = await import(`${url}/dist/transformers.min.js`);
                    clearTimeout(timeout);
                    
                    return pipeline;
                } catch (err) {
                    console.warn(`Falha no CDN ${currentCdnIndex + 1}:`, err);
                    currentCdnIndex++;
                    
                    if (err.name === 'TypeError' && err.message.includes('socket')) {
                        els.status.textContent = '⚠️ Erro de conexão. Tentando outro servidor...';
                        els.status.classList.add('warning');
                    }
                }
            }
            throw new Error('Não foi possível conectar a nenhum servidor. Verifique sua internet.');
        }

        // 🔍 Verificar permissão do microfone
        async function checkMicPermission() {
            try {
                if (navigator.permissions && navigator.permissions.query) {
                    const result = await navigator.permissions.query({ name: 'microphone' });
                    micPermissionGranted = (result.state === 'granted');
                    
                    if (result.state === 'denied') {
                        showPermissionDenied();
                        return false;
                    } else if (result.state === 'prompt') {
                        els.btnPermission.style.display = 'block';
                        els.permissionHelp.style.display = 'block';
                    }
                    return micPermissionGranted;
                }
                return true;
            } catch (e) {
                console.warn('Não foi possível verificar permissão:', e);
                return true;
            }
        }

        function showPermissionDenied() {
            els.btnPermission.style.display = 'block';
            els.btnPermission.textContent = '⚙️ Abrir Configurações';
            els.permissionHelp.style.display = 'block';
            els.status.textContent = '⛔ Permissão negada. Configure manualmente.';
            els.status.classList.add('error');
        }

        // 🔐 Solicitar permissão do microfone
        async function requestMicPermission() {
            try {
                els.status.textContent = '🔐 Solicitando acesso ao microfone...';
                els.status.classList.remove('error', 'warning');
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(track => track.stop());
                
                micPermissionGranted = true;
                els.btnPermission.style.display = 'none';
                els.permissionHelp.style.display = 'none';
                els.status.textContent = '✅ Microfone autorizado!';
                els.status.classList.add('success');
                
                return true;
            } catch (err) {
                console.error('Erro ao solicitar microfone:', err);
                
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    showPermissionDenied();
                } else if (err.name === 'NotFoundError') {
                    els.status.textContent = '⛔ Nenhum microfone detectado.';
                    els.status.classList.add('error');
                } else if (err.name === 'NotSupportedError') {
                    els.status.textContent = '⚠️ WebView não suporta gravação.';
                    els.status.classList.add('error');
                } else {
                    els.status.textContent = '⚠️ Erro: ' + err.message;
                    els.status.classList.add('warning');
                }
                return false;
            }
        }

        // 🔄 Botão de retry para erros de conexão
        els.btnRetry.addEventListener('click', () => {
            els.btnRetry.style.display = 'none';
            els.btnModel.disabled = false;
            els.btnModel.click();
        });

        // Botão de permissão
        els.btnPermission.addEventListener('click', async () => {
            if (isAndroid) {
                els.status.textContent = '🔧 Abra as configurações do app para permitir o microfone.';
                els.status.classList.add('warning');
            } else {
                const granted = await requestMicPermission();
                if (granted) els.btnRecord.disabled = false;
            }
        });

        // 1. Carregar modelo Whisper Tiny COM TRATAMENTO DE ERRO DE SOCKET
        els.btnModel.addEventListener('click', async () => {
            els.btnModel.disabled = true;
            els.btnRetry.style.display = 'none';
            els.status.textContent = '📥 Baixando modelo (~40MB)...';
            els.status.classList.remove('error', 'warning');
            
            try {
                // Verifica APIs básicas primeiro
                if (!navigator.mediaDevices?.getUserMedia) {
                    throw new Error('API de áudio não suportada');
                }
                
                // Carrega biblioteca com fallback de CDN
                const { pipeline } = await loadTransformersLib();
                
                // Carrega modelo com retry
                transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny', {
                    quantized: 'q4',
                    dtype: 'fp32',
                    // Cache configuration para Android
                    cache_dir: 'transformers-cache'
                });
                
                els.btnModel.textContent = '✅ Modelo Pronto';
                els.btnRecord.disabled = false;
                
                await checkMicPermission();
                els.status.textContent = micPermissionGranted 
                    ? '🟢 Pronto! Toque em "Gravar".' 
                    : '🟡 Modelo pronto. Conceda permissão do microfone.';
                    
            } catch (e) {
                console.error('Erro ao carregar:', e);
                
                // Detecta erro de socket/conexão
                if (e.message?.includes('socket') || e.message?.includes('ERR_SOCKET') || 
                    e.message?.includes('Failed to fetch') || e.name === 'TypeError') {
                    
                    els.status.textContent = '⚠️ Erro de conexão com o servidor.';
                    els.status.classList.add('warning');
                    els.btnRetry.style.display = 'block';
                    els.btnModel.textContent = '❌ Falha na Conexão';
                } else {
                    els.status.textContent = '❌ Erro: ' + e.message;
                    els.status.classList.add('error');
                }
                els.btnModel.disabled = false;
            }
        });

        // 2. Controle de Gravação
        els.btnRecord.addEventListener('click', async () => {
            if (!isRecording) {
                if (!micPermissionGranted) {
                    const granted = await requestMicPermission();
                    if (!granted) return;
                }
                await startRecording();
            } else {
                stopRecording();
            }
        });

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        sampleRate: 16000
                    } 
                });
                
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                audioChunks = [];

                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = async () => {
                    stream.getTracks().forEach(t => t.stop());
                    await processAudio(new Blob(audioChunks, { type: 'audio/webm' }));
                };

                mediaRecorder.onerror = (e) => {
                    console.error('Erro no MediaRecorder:', e.error);
                    els.status.textContent = '❌ Erro na gravação: ' + (e.error?.message || 'Erro desconhecido');
                    els.status.classList.add('error');
                    stopRecording();
                };

                mediaRecorder.start();
                isRecording = true;
                els.btnRecord.textContent = '⏹️ Parar';
                els.btnRecord.classList.add('recording');
                els.status.textContent = '🎤 Ouvindo...';
                els.output.value = '';
                els.btnDownload.style.display = 'none';
            } catch (err) {
                console.error('Erro ao acessar microfone:', err);
                
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    showPermissionDenied();
                } else if (err.name === 'NotFoundError') {
                    els.status.textContent = '⛔ Nenhum microfone encontrado.';
                    els.status.classList.add('error');
                } else {
                    els.status.textContent = '⚠️ Erro: ' + err.message;
                    els.status.classList.add('warning');
                }
                isRecording = false;
                els.btnRecord.textContent = '🎤 Iniciar Gravação';
                els.btnRecord.classList.remove('recording');
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            isRecording = false;
            els.btnRecord.textContent = '🎤 Iniciar Gravação';
            els.btnRecord.classList.remove('recording');
            els.btnRecord.disabled = true;
            els.status.textContent = '⏳ Processando áudio...';
        }

        // 3. Processamento de Áudio
        async function processAudio(blob) {
            try {
                const arrayBuffer = await blob.arrayBuffer();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                
                const targetRate = 16000;
                const offlineCtx = new OfflineAudioContext(1, audioBuffer.duration * targetRate, targetRate);
                const source = offlineCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(offlineCtx.destination);
                source.start();
                const rendered = await offlineCtx.startRendering();
                const float32Data = rendered.getChannelData(0);

                const lang = els.langSelect.value;
                const result = await transcriber(float32Data, {
                    language: lang,
                    task: 'transcribe'
                });

                els.output.value = result.text.trim();
                els.status.textContent = '✅ Transcrição concluída!';
                els.status.classList.remove('error', 'warning');
                els.btnDownload.style.display = 'block';
            } catch (e) {
                console.error('Erro no processamento:', e);
                els.status.textContent = '❌ Erro: ' + e.message;
                els.status.classList.add('error');
            } finally {
                els.btnRecord.disabled = false;
            }
        }

        // 4. Download
        els.btnDownload.addEventListener('click', () => {
            const text = els.output.value.trim();
            if (!text) return;
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const lang = els.langSelect.value === 'pt' ? 'pt' : 'en';
            const date = new Date().toISOString().slice(0, 10);
            a.href = url;
            a.download = `transcricao_${lang}_${date}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // 🚀 Inicialização
        window.addEventListener('DOMContentLoaded', async () => {
            if (!navigator.mediaDevices?.getUserMedia) {
                els.status.textContent = '⛔ Este ambiente não suporta gravação de áudio.';
                els.status.classList.add('error');
                els.btnRecord.disabled = true;
                els.permissionHelp.innerHTML = '💡 Atualize o Android System WebView ou use outro navegador.';
                els.permissionHelp.style.display = 'block';
                return;
            }
            
            if (isAndroid) {
                els.permissionHelp.style.display = 'block';
            }
            
            await checkMicPermission();
        });
    </script>
</body>
</html>
