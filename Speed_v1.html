<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    <meta http-equiv="Permissions-Policy" content="microphone=(self)">
    <meta http-equiv="Feature-Policy" content="microphone 'self'">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src *; media-src *; style-src * 'unsafe-inline';">
    
    <title>🎙️ Transcritor Offline</title>
    <style>
        :root { --bg: #f0f2f5; --card: #fff; --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --text: #1f2937; --warning: #f59e0b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: var(--card); width: 100%; max-width: 540px; padding: 24px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        h1 { text-align: center; margin-bottom: 20px; font-size: 1.5rem; color: var(--text); }
        .controls { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
        select, button { padding: 12px; border-radius: 10px; border: 1px solid #d1d5db; font-size: 15px; transition: 0.2s; cursor: pointer; font-weight: 500; }
        select { flex: 1; background: #fff; }
        .btn-model { background: #6366f1; color: #fff; border: none; }
        .btn-model:disabled { background: #9ca3af; cursor: not-allowed; }
        .btn-mic { background: var(--warning); color: #1f2937; width: 100%; margin-bottom: 10px; }
        .btn-record { flex: 1; background: var(--primary); color: #fff; border: none; }
        .btn-record:disabled { background: #9ca3af; cursor: not-allowed; }
        .btn-record.recording { background: var(--danger); }
        .btn-retry { background: #8b5cf6; color: #fff; border: none; width: 100%; margin-top: 8px; display: none; }
        .status { text-align: center; margin: 10px 0; font-size: 14px; color: #4b5563; min-height: 20px; line-height: 1.5; }
        .status.error { color: var(--danger); font-weight: 500; }
        .status.warning { color: var(--warning); font-weight: 500; }
        .status.success { color: var(--success); font-weight: 500; }
        textarea { width: 100%; height: 160px; padding: 12px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 15px; line-height: 1.5; background: #f9fafb; resize: vertical; margin-top: 10px; }
        .btn-download { width: 100%; margin-top: 10px; padding: 12px; background: var(--success); color: #fff; border: none; display: none; }
        .help-box { font-size: 12px; color: #6b7280; margin-top: 8px; background: #fffbeb; padding: 12px; border-radius: 8px; border-left: 4px solid var(--warning); display: none; }
        .help-box code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; }
        @media (max-width: 420px) { .controls { flex-direction: column; } button { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Transcritor de Áudio Offline</h1>
        
        <button id="btnMic" class="btn-mic">🎤 Solicitar Permissão do Microfone</button>
        <button id="btnRetry" class="btn-retry">🔄 Tentar Novamente (Android 6 Workaround)</button>
        
        <div class="controls">
            <select id="langSelect">
                <option value="pt">🇧🇷 Português</option>
                <option value="en">🇺🇸 English</option>
            </select>
            <button id="btnModel" class="btn-model" disabled>⏳ Aguardando microfone...</button>
        </div>
        <button id="btnRecord" class="btn-record" disabled>🔴 Iniciar Gravação</button>
        <div id="status" class="status">Toque no botão acima para ativar o microfone.</div>
        
        <div id="helpBox" class="help-box">
            💡 <strong>Dica Android 6.0:</strong> Se pedir permissão e ainda falhar:<br>
            1. Toque em "🔄 Tentar Novamente"<br>
            2. Aguarde 2 segundos após permitir<br>
            3. Verifique se outro app não está usando o mic
        </div>
        
        <textarea id="output" placeholder="A transcrição aparecerá aqui..." readonly></textarea>
        <button id="btnDownload" class="btn-download">📥 Baixar Transcrição (.txt)</button>
    </div>

    <!-- Elemento oculto para ativar stream no WebView -->
    <video id="hiddenVideo" autoplay playsinline muted style="display:none;"></video>

    <script type="module">
        let transcriber = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let audioCtx = null;
        let micStream = null;
        let micPermissionGranted = false;
        let retryCount = 0;
        const MAX_RETRIES = 3;

        const els = {
            btnMic: document.getElementById('btnMic'),
            btnRetry: document.getElementById('btnRetry'),
            btnModel: document.getElementById('btnModel'),
            btnRecord: document.getElementById('btnRecord'),
            status: document.getElementById('status'),
            output: document.getElementById('output'),
            btnDownload: document.getElementById('btnDownload'),
            helpBox: document.getElementById('helpBox'),
            hiddenVideo: document.getElementById('hiddenVideo')
        };

        // 🔊 Valida se o stream realmente contém áudio
        function validateStream(stream) {
            if (!stream) return false;
            const tracks = stream.getAudioTracks();
            if (tracks.length === 0) return false;
            // Verifica se a track está ativa e não mutada
            return tracks[0].enabled && tracks[0].muted === false;
        }

        // 🔄 Tenta getUserMedia com fallback progressivo
        async function requestMicStream() {
            els.status.textContent = '🔐 Ativando microfone...';
            els.status.className = 'status';
            els.helpBox.style.display = 'none';

            // Lista de constraints do mais específico para o mais simples
            const constraintsList = [
                { audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 16000, channelCount: 1 } },
                { audio: { echoCancellation: true, noiseSuppression: true } },
                { audio: true } // Fallback final (máxima compatibilidade WebView)
            ];

            for (let i = 0; i < constraintsList.length; i++) {
                try {
                    els.status.textContent = `🔍 Tentativa ${i + 1}/${constraintsList.length}...`;
                    
                    // ⚠️ Android WebView precisa de pequeno delay após interação do usuário
                    if (i > 0) await new Promise(r => setTimeout(r, 500));
                    
                    const stream = await navigator.mediaDevices.getUserMedia(constraintsList[i]);
                    
                    // Workaround crítico para Android WebView: anexar ao <video> oculto
                    els.hiddenVideo.srcObject = stream;
                    await els.hiddenVideo.play().catch(() => {});
                    
                    if (validateStream(stream)) {
                        micStream = stream;
                        micPermissionGranted = true;
                        retryCount = 0;
                        els.btnRetry.style.display = 'none';
                        els.status.textContent = '✅ Microfone ativo! Pronto para gravar.';
                        els.status.className = 'status success';
                        return true;
                    } else {
                        // Stream vazio ou inválido
                        stream.getTracks().forEach(t => t.stop());
                    }
                } catch (err) {
                    console.warn(`⚠️ Falha na tentativa ${i + 1}:`, err.name, err.message);
                    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                        els.status.textContent = '⛔ Permissão negada. Toque em permitir nas configurações.';
                        els.status.className = 'status error';
                        els.btnRetry.style.display = 'block';
                        return false;
                    }
                }
            }

            els.status.textContent = '⚠️ Falha ao ativar microfone. Toque em "Tentar Novamente".';
            els.status.className = 'status warning';
            els.btnRetry.style.display = 'block';
            els.helpBox.style.display = 'block';
            return false;
        }

        // 🔘 Botão principal de permissão
        els.btnMic.addEventListener('click', async () => {
            const success = await requestMicStream();
            if (success) {
                els.btnModel.disabled = false;
                els.btnModel.textContent = '⏳ Baixar Modelo';
                els.btnRecord.disabled = false;
            }
        });

        // 🔄 Botão de retry (Android 6 workaround)
        els.btnRetry.addEventListener('click', async () => {
            retryCount++;
            if (retryCount > MAX_RETRIES) {
                els.status.textContent = `⛔ Limite de tentativas atingido. Reinicie o app.`;
                els.status.className = 'status error';
                els.btnRetry.disabled = true;
                return;
            }
            
            // Limpa stream anterior
            if (micStream) {
                micStream.getTracks().forEach(t => t.stop());
                micStream = null;
            }
            
            els.status.textContent = `🔄 Tentativa ${retryCount}/${MAX_RETRIES}... Aguarde 2s`;
            // Delay proposital para sincronizar permissão do sistema com WebView
            await new Promise(r => setTimeout(r, 2000));
            await requestMicStream();
        });

        // 🎤 Controle de Gravação
        els.btnRecord.addEventListener('click', async () => {
            if (!isRecording) {
                if (!micPermissionGranted) {
                    const success = await requestMicStream();
                    if (!success) return;
                }
                await startRecording();
            } else {
                stopRecording();
            }
        });

        async function startRecording() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    if (audioCtx.state === 'suspended') await audioCtx.resume();
                }

                // Seleciona mimeType compatível
                const mimeTypes = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus'];
                let selectedMime = mimeTypes.find(m => MediaRecorder.isTypeSupported(m)) || '';

                mediaRecorder = new MediaRecorder(micStream, { mimeType: selectedMime || undefined });
                audioChunks = [];

                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = async () => await processAudio(new Blob(audioChunks, { type: selectedMime || 'audio/webm' }));
                mediaRecorder.onerror = (e) => {
                    els.status.textContent = '❌ Erro na gravação: ' + (e.error?.message || e.error);
                    els.status.className = 'status error';
                    stopRecording();
                };

                mediaRecorder.start(100);
                isRecording = true;
                els.btnRecord.textContent = '⏹️ Parar';
                els.btnRecord.classList.add('recording');
                els.status.textContent = '🎤 Gravando...';
                els.output.value = '';
                els.btnDownload.style.display = 'none';
            } catch (err) {
                els.status.textContent = '❌ ' + err.message;
                els.status.className = 'status error';
                console.error(err);
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            isRecording = false;
            els.btnRecord.textContent = '🔴 Iniciar Gravação';
            els.btnRecord.classList.remove('recording');
            els.btnRecord.disabled = true;
            els.status.textContent = '⏳ Processando áudio...';
        }

        // 📝 Processamento
        async function processAudio(blob) {
            try {
                const arrayBuffer = await blob.arrayBuffer();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                const targetRate = 16000;
                const offlineCtx = new OfflineAudioContext(1, audioBuffer.duration * targetRate, targetRate);
                const source = offlineCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(offlineCtx.destination);
                source.start();
                const rendered = await offlineCtx.startRendering();
                const float32Data = rendered.getChannelData(0);

                els.status.textContent = '🔄 Transcrevendo (pode demorar)...';
                const lang = els.langSelect.value;
                
                if (!transcriber) {
                    const { pipeline } = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2');
                    transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny', { quantized: true, dtype: 'fp32' });
                }

                const result = await transcriber(float32Data, { language: lang, task: 'transcribe' });
                els.output.value = result.text.trim();
                els.status.textContent = '✅ Concluído!';
                els.status.className = 'status success';
                els.btnDownload.style.display = 'block';
            } catch (e) {
                els.status.textContent = '❌ Erro: ' + e.message;
                els.status.className = 'status error';
                console.error(e);
            } finally {
                els.btnRecord.disabled = false;
            }
        }

        // 💾 Download
        els.btnDownload.addEventListener('click', () => {
            const text = els.output.value.trim();
            if (!text) return;
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `transcricao_${els.langSelect.value}_${new Date().toISOString().slice(0,10)}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // 🚀 Inicialização segura
        window.addEventListener('DOMContentLoaded', () => {
            if (!navigator.mediaDevices?.getUserMedia) {
                els.status.textContent = '⛔ Navegador não suporta gravação de áudio.';
                els.status.className = 'status error';
                return;
            }
            
            // Android 6: prepara UI específica
            if (/Android 6\.0/i.test(navigator.userAgent)) {
                els.helpBox.style.display = 'block';
                els.helpBox.innerHTML += '<br><small>📱 Android 6.0 detectado. Use o botão "Tentar Novamente" se falhar.</small>';
            }
        });
    </script>
</body>
</html>
