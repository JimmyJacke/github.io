<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    <title>🎙️ Transcritor de Voz</title>
    <style>
        :root { --bg: #f0f2f5; --card: #fff; --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --text: #1f2937; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: var(--card); width: 100%; max-width: 540px; padding: 24px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        h1 { text-align: center; margin-bottom: 20px; font-size: 1.5rem; color: var(--text); }
        .controls { display: flex; gap: 10px; margin-bottom: 12px; }
        select { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #d1d5db; font-size: 15px; background: #fff; }
        button { padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 500; transition: 0.2s; color: #fff; width: 100%; }
        .btn-record { background: var(--primary); }
        .btn-record.recording { background: var(--danger); }
        .btn-record:disabled { background: #9ca3af; cursor: not-allowed; }
        .status { text-align: center; margin: 10px 0; font-size: 14px; color: #4b5563; min-height: 20px; }
        .status.error { color: var(--danger); font-weight: 500; }
        .status.success { color: var(--success); font-weight: 500; }
        textarea { width: 100%; height: 180px; padding: 12px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 15px; line-height: 1.5; background: #f9fafb; resize: vertical; }
        .btn-download { background: var(--success); margin-top: 10px; display: none; }
        @media (max-width: 420px) { .controls { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Transcritor de Voz</h1>
        
        <div class="controls">
            <select id="langSelect">
                <option value="pt-BR">🇧🇷 Português (Brasil)</option>
                <option value="en-US">🇺🇸 English (US)</option>
            </select>
        </div>
        
        <button id="btnRecord" class="btn-record" disabled>🎤 Iniciar Gravação</button>
        <div id="status" class="status">Iniciando reconhecimento de voz...</div>
        
        <textarea id="output" placeholder="A transcrição aparecerá aqui..." readonly></textarea>
        <button id="btnDownload" class="btn-download">📥 Baixar Transcrição (.txt)</button>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const els = {
            btnRecord: document.getElementById('btnRecord'),
            langSelect: document.getElementById('langSelect'),
            status: document.getElementById('status'),
            output: document.getElementById('output'),
            btnDownload: document.getElementById('btnDownload')
        };

        let recognition = null;
        let isRecording = false;
        let finalText = '';

        // Inicializa API de Reconhecimento
        function initSpeechAPI() {
            if (!SpeechRecognition) {
                els.status.textContent = '⛔ Seu navegador/app não suporta reconhecimento de voz.';
                els.status.classList.add('error');
                return false;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                isRecording = true;
                els.btnRecord.textContent = '⏹️ Parar';
                els.btnRecord.classList.add('recording');
                els.status.textContent = '🎤 Ouvindo...';
            };

            recognition.onend = () => {
                // Reinicia automaticamente se ainda estiver gravando
                if (isRecording) {
                    try { recognition.start(); } catch(e) {}
                } else {
                    els.btnRecord.textContent = '🎤 Iniciar Gravação';
                    els.btnRecord.classList.remove('recording');
                    els.status.textContent = '✅ Parado.';
                }
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let newFinal = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        newFinal += transcript;
                    } else {
                        interimTranscript += transcript;
                    }
                }

                if (newFinal) {
                    finalText += (finalText ? ' ' : '') + newFinal;
                    els.output.value = finalText;
                    els.btnDownload.style.display = 'block';
                }
                
                els.status.textContent = interimTranscript ? `🎤 ${interimTranscript}...` : '🎤 Ouvindo...';
            };

            recognition.onerror = (event) => {
                console.error('Erro SpeechRecognition:', event.error);
                if (event.error === 'not-allowed') {
                    els.status.textContent = '⛔ Permissão do microfone negada.';
                    els.status.classList.add('error');
                } else if (event.error === 'no-speech') {
                    els.status.textContent = '⚠️ Nenhum áudio detectado.';
                } else if (event.error === 'network') {
                    els.status.textContent = '⚠️ Erro de rede. Verifique a internet ou instale o pacote de idioma offline.';
                    els.status.classList.add('error');
                } else {
                    els.status.textContent = `⚠️ Erro: ${event.error}`;
                    els.status.classList.add('error');
                }
                
                if (event.error !== 'no-speech' && event.error !== 'aborted') {
                    stopRecording();
                }
            };

            return true;
        }

        // Controle de Gravação
        els.btnRecord.addEventListener('click', () => {
            if (!isRecording) {
                if (!recognition) {
                    if (!initSpeechAPI()) return;
                }
                recognition.lang = els.langSelect.value;
                finalText = els.output.value.trim();
                try {
                    recognition.start();
                } catch(e) {
                    els.status.textContent = '⚠️ Erro ao iniciar. Toque novamente.';
                }
            } else {
                stopRecording();
            }
        });

        function stopRecording() {
            isRecording = false;
            if (recognition) {
                recognition.stop();
            }
        }

        // Download
        els.btnDownload.addEventListener('click', () => {
            const text = els.output.value.trim();
            if (!text) return;
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const date = new Date().toISOString().slice(0, 10);
            a.href = url;
            a.download = `transcricao_${date}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // Inicialização
        window.addEventListener('DOMContentLoaded', () => {
            if (initSpeechAPI()) {
                els.btnRecord.disabled = false;
                els.status.textContent = '✅ Pronto! Toque em "Gravar".';
            }
        });
    </script>
</body>
</html>
