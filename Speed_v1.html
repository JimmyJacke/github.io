<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    
    <!-- Permissões para WebView/Android -->
    <meta http-equiv="Permissions-Policy" content="microphone=(self)">
    <meta http-equiv="Feature-Policy" content="microphone 'self'">
    
    <title>🎙️ Transcritor Offline</title>
    <style>
        :root { --bg: #f0f2f5; --card: #fff; --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --text: #1f2937; --warning: #f59e0b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: var(--card); width: 100%; max-width: 540px; padding: 24px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        h1 { text-align: center; margin-bottom: 20px; font-size: 1.5rem; color: var(--text); }
        .controls { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
        select, button { padding: 12px; border-radius: 10px; border: 1px solid #d1d5db; font-size: 15px; transition: 0.2s; }
        select { flex: 1; background: #fff; }
        button { cursor: pointer; font-weight: 500; border: none; color: #fff; }
        .btn-model { background: #6366f1; }
        .btn-model:disabled { background: #9ca3af; cursor: not-allowed; }
        .btn-record { flex: 1; background: var(--primary); }
        .btn-record:disabled { background: #9ca3af; }
        .btn-record.recording { background: var(--danger); }
        .btn-permission { background: var(--warning); color: #1f2937; width: 100%; margin-bottom: 10px; display: none; }
        .btn-permission:hover { filter: brightness(0.95); }
        .btn-recheck { background: #8b5cf6; width: 100%; margin-top: 8px; display: none; }
        .status { text-align: center; margin: 10px 0; font-size: 14px; color: #4b5563; min-height: 20px; }
        .status.error { color: var(--danger); font-weight: 500; }
        .status.warning { color: var(--warning); font-weight: 500; }
        .status.success { color: var(--success); font-weight: 500; }
        textarea { width: 100%; height: 160px; padding: 12px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 15px; line-height: 1.5; background: #f9fafb; resize: vertical; }
        .btn-download { width: 100%; margin-top: 10px; padding: 12px; background: var(--success); display: none; }
        .btn-download:hover { filter: brightness(0.9); }
        .permission-help { font-size: 12px; color: #6b7280; margin-top: 8px; text-align: center; display: none; background: #fffbeb; padding: 12px; border-radius: 8px; border-left: 4px solid var(--warning); }
        .permission-steps { text-align: left; margin-top: 10px; font-size: 11px; line-height: 1.6; }
        .permission-steps code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        @media (max-width: 420px) { .controls { flex-direction: column; } button { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Transcritor de Áudio Offline</h1>
        
        <!-- Botões de permissão -->
        <button id="btnPermission" class="btn-permission">🔐 Permitir Acesso ao Microfone</button>
        <button id="btnRecheck" class="btn-recheck">🔄 Já permiti! Verificar novamente</button>
        
        <div class="controls">
            <select id="langSelect">
                <option value="pt">🇧🇷 Português</option>
                <option value="en">🇺🇸 English</option>
            </select>
            <button id="btnModel" class="btn-model">⏳ Baixar Modelo</button>
        </div>
        <button id="btnRecord" class="btn-record" disabled>🎤 Iniciar Gravação</button>
        <div id="status" class="status">Carregue o modelo para começar. Funciona 100% offline após o 1º uso.</div>
        
        <div id="permissionHelp" class="permission-help">
            <strong>🔧 Como permitir o microfone no Android:</strong>
            <div class="permission-steps" id="permissionSteps">
                <!-- Preenchido dinamicamente por JS -->
            </div>
        </div>
        
        <textarea id="output" placeholder="A transcrição aparecerá aqui..." readonly></textarea>
        <button id="btnDownload" class="btn-download">📥 Baixar Transcrição (.txt)</button>
    </div>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
        
        let transcriber = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let audioCtx = null;
        let micPermissionGranted = false;
        let isAndroid = false;
        let androidVersion = 0;

        const els = {
            btnModel: document.getElementById('btnModel'),
            btnRecord: document.getElementById('btnRecord'),
            btnPermission: document.getElementById('btnPermission'),
            btnRecheck: document.getElementById('btnRecheck'),
            permissionHelp: document.getElementById('permissionHelp'),
            permissionSteps: document.getElementById('permissionSteps'),
            langSelect: document.getElementById('langSelect'),
            status: document.getElementById('status'),
            output: document.getElementById('output'),
            btnDownload: document.getElementById('btnDownload')
        };

        // 🔍 Detecta Android e versão
        function detectAndroid() {
            const ua = navigator.userAgent;
            isAndroid = /Android/i.test(ua);
            if (isAndroid) {
                const match = ua.match(/Android\s([0-9.]+)/i);
                androidVersion = match ? parseFloat(match[1]) : 0;
            }
            return isAndroid;
        }

        // 📋 Gera instruções específicas por versão do Android
        function getPermissionInstructions() {
            if (!isAndroid) {
                return '💡 Clique no botão "🔐 Permitir Acesso ao Microfone" e autorize quando solicitado.';
            }
            
            let steps = `<ol style="margin:8px 0 0 16px;padding:0;">`;
            steps += `<li>Abra <code>Configurações</code> do seu Android</li>`;
            steps += `<li>Toque em <code>Apps</code> ou <code>Aplicativos</code></li>`;
            steps += `<li>Encontre este app na lista (pode aparecer como "Kodular", "WebView" ou nome do seu projeto)</li>`;
            steps += `<li>Toque em <code>Permissões</code></li>`;
            steps += `<li>Toque em <code>Microfone</code></li>`;
            steps += `<li>Selecione <code>${androidVersion >= 11 ? 'Permitir apenas durante o uso' : 'Permitir'}</code></li>`;
            steps += `</ol>`;
            steps += `<small style="color:#9ca3af;display:block;margin-top:8px;">⚠️ Se não encontrar, procure por "Permissões do app" na busca das Configurações</small>`;
            
            return steps;
        }

        // ✅ Solicitação de permissão - versão simplificada para máxima compatibilidade
        async function requestMicPermission(simple = false) {
            try {
                els.status.textContent = '🔐 Solicitando acesso...';
                els.status.classList.remove('error', 'warning', 'success');
                
                // Configurações mais compatíveis para Android WebView
                const audioConfig = simple 
                    ? { audio: true } // ✅ Mais simples = mais compatível
                    : { 
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            sampleRate: 16000,
                            channelCount: 1
                        } 
                      };
                
                const stream = await navigator.mediaDevices.getUserMedia(audioConfig);
                
                // Permissão concedida!
                stream.getTracks().forEach(track => track.stop());
                
                micPermissionGranted = true;
                els.btnPermission.style.display = 'none';
                els.btnRecheck.style.display = 'none';
                els.permissionHelp.style.display = 'none';
                els.status.textContent = '✅ Microfone autorizado!';
                els.status.classList.add('success');
                
                if (transcriber) els.btnRecord.disabled = false;
                
                return true;
            } catch (err) {
                console.error('❌ Erro ao solicitar microfone:', err);
                
                // Mapeamento de erros para mensagens amigáveis
                const errorMap = {
                    'NotAllowedError': '⛔ Permissão negada. Permita nas configurações.',
                    'PermissionDeniedError': '⛔ Acesso negado pelo sistema.',
                    'NotFoundError': '⛔ Nenhum microfone detectado.',
                    'NotReadableError': '⛔ Microfone em uso por outro app.',
                    'NotSupportedError': '⚠️ Gravação não suportada neste dispositivo.',
                    'SecurityError': '⚠️ Contexto de segurança restrito.',
                    'AbortError': '⚠️ Solicitação cancelada.',
                    'OverconstrainedError': '⚠️ Configurações de áudio incompatíveis.'
                };
                
                const message = errorMap[err.name] || `⚠️ Erro: ${err.message}`;
                els.status.textContent = message;
                els.status.classList.add('error');
                
                // Se for NotAllowedError, mostra ajuda para configuração manual
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    els.permissionHelp.style.display = 'block';
                    els.btnPermission.style.display = 'block';
                    els.btnRecheck.style.display = 'block';
                    
                    // Detecta se pode ser "negado permanentemente"
                    if (await checkIsPermanentlyDenied()) {
                        els.status.textContent = '🔒 Permissão bloqueada permanentemente.';
                        els.permissionHelp.innerHTML += '<br><small style="color:#dc2626">⚠️ Você marcou "Nunca perguntar"? Toque em "🔄 Verificar novamente" após habilitar manualmente.</small>';
                    }
                }
                
                return false;
            }
        }

        // 🔒 Verifica se permissão foi negada permanentemente (Android 6+)
        async function checkIsPermanentlyDenied() {
            try {
                if (navigator.permissions && navigator.permissions.query) {
                    const result = await navigator.permissions.query({ name: 'microphone' });
                    return result.state === 'denied';
                }
            } catch (e) {
                // API não suportada - assume que pode ser permanente
            }
            return false;
        }

        // 🔄 Botão "Verificar novamente" - reavalia após usuário habilitar nas configurações
        els.btnRecheck.addEventListener('click', async () => {
            els.status.textContent = '🔄 Verificando permissão...';
            els.status.classList.remove('error', 'warning');
            
            // Tenta primeiro com configurações simples (mais compatível)
            const granted = await requestMicPermission(true);
            
            if (!granted) {
                // Se falhar, tenta com configurações completas
                await requestMicPermission(false);
            }
        });

        // 🔘 Botão principal de permissão
        els.btnPermission.addEventListener('click', async () => {
            // Tenta com configurações completas primeiro
            let granted = await requestMicPermission(false);
            
            if (!granted) {
                // Fallback para modo simples
                granted = await requestMicPermission(true);
            }
            
            if (granted && transcriber) {
                els.btnRecord.disabled = false;
            }
        });

        // 1. Carregar modelo Whisper Tiny
        els.btnModel.addEventListener('click', async () => {
            els.btnModel.disabled = true;
            els.status.textContent = '📥 Baixando modelo (~40MB)...';
            els.status.classList.remove('error', 'warning');
            
            try {
                transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny', {
                    quantized: true,
                    dtype: 'fp32'
                });
                
                els.btnModel.textContent = '✅ Modelo Pronto';
                els.btnModel.disabled = true;
                
                // Configura UI para Android
                if (isAndroid) {
                    els.permissionSteps.innerHTML = getPermissionInstructions();
                    
                    // Tenta obter permissão automaticamente (pode funcionar em alguns casos)
                    try {
                        await new Promise(r => setTimeout(r, 800));
                        const testStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        testStream.getTracks().forEach(t => t.stop());
                        micPermissionGranted = true;
                        els.btnRecord.disabled = false;
                        els.status.textContent = '🟢 Pronto! Toque em "Gravar".';
                        return;
                    } catch (e) {
                        // Era esperado - mostra botão de permissão
                        els.btnPermission.style.display = 'block';
                        els.permissionHelp.style.display = 'block';
                        els.status.textContent = '🟡 Permita o microfone para começar.';
                        els.status.classList.add('warning');
                    }
                } else {
                    // Navegador comum - tenta permissão normal
                    if (await requestMicPermission(false)) {
                        els.btnRecord.disabled = false;
                        els.status.textContent = '🟢 Pronto!';
                    }
                }
                
            } catch (e) {
                console.error('Erro ao carregar modelo:', e);
                els.status.textContent = '❌ Erro: ' + e.message;
                els.status.classList.add('error');
                els.btnModel.disabled = false;
                els.btnModel.textContent = '⏳ Baixar Modelo';
            }
        });

        // 2. Controle de Gravação
        els.btnRecord.addEventListener('click', async () => {
            if (!isRecording) {
                if (!micPermissionGranted) {
                    const granted = await requestMicPermission(true); // Usa modo simples primeiro
                    if (!granted) return;
                }
                await startRecording();
            } else {
                stopRecording();
            }
        });

        async function startRecording() {
            try {
                // Tenta com configurações completas, fallback para simples
                let stream;
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            sampleRate: 16000,
                            channelCount: 1
                        } 
                    });
                } catch (e) {
                    console.log('⚠️ Fallback para configurações simples de áudio');
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                }
                
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                // Seleciona mimeType compatível
                const mimeTypes = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4'];
                let selectedMimeType = mimeTypes.find(mime => MediaRecorder.isTypeSupported(mime)) || '';
                
                mediaRecorder = new MediaRecorder(stream, { 
                    mimeType: selectedMimeType || undefined 
                });
                
                audioChunks = [];

                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = async () => {
                    stream.getTracks().forEach(track => track.stop());
                    await processAudio(new Blob(audioChunks, { type: selectedMimeType || 'audio/webm' }));
                };

                mediaRecorder.onerror = (e) => {
                    console.error('❌ Erro no MediaRecorder:', e.error);
                    els.status.textContent = '❌ Erro: ' + (e.error?.message || 'Falha na gravação');
                    els.status.classList.add('error');
                    stopRecording();
                };

                mediaRecorder.start(100);
                isRecording = true;
                els.btnRecord.textContent = '⏹️ Parar';
                els.btnRecord.classList.add('recording');
                els.status.textContent = '🎤 Ouvindo...';
                els.output.value = '';
                els.btnDownload.style.display = 'none';
                
            } catch (err) {
                console.error('❌ Erro ao gravar:', err);
                els.status.textContent = '⛔ ' + (err.message || 'Erro ao acessar microfone');
                els.status.classList.add('error');
                isRecording = false;
                els.btnRecord.textContent = '🎤 Iniciar Gravação';
                els.btnRecord.classList.remove('recording');
                els.btnRecord.disabled = false;
                
                if (err.name === 'NotAllowedError') {
                    els.btnPermission.style.display = 'block';
                    els.btnRecheck.style.display = 'block';
                    els.permissionHelp.style.display = 'block';
                }
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            isRecording = false;
            els.btnRecord.textContent = '🎤 Iniciar Gravação';
            els.btnRecord.classList.remove('recording');
            els.btnRecord.disabled = true;
            els.status.textContent = '⏳ Processando...';
        }

        // 3. Processamento de Áudio
        async function processAudio(blob) {
            try {
                const arrayBuffer = await blob.arrayBuffer();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                
                const targetRate = 16000;
                const offlineCtx = new OfflineAudioContext(1, audioBuffer.duration * targetRate, targetRate);
                const source = offlineCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(offlineCtx.destination);
                source.start();
                const rendered = await offlineCtx.startRendering();
                const float32Data = rendered.getChannelData(0);

                const lang = els.langSelect.value;
                els.status.textContent = '🔄 Transcrevendo...';
                
                const result = await transcriber(float32Data, {
                    language: lang,
                    task: 'transcribe'
                });

                els.output.value = result.text.trim();
                els.status.textContent = '✅ Concluído!';
                els.status.classList.remove('error', 'warning');
                els.status.classList.add('success');
                els.btnDownload.style.display = 'block';
                
            } catch (e) {
                console.error('❌ Erro no processamento:', e);
                els.status.textContent = '❌ Erro: ' + e.message;
                els.status.classList.add('error');
            } finally {
                els.btnRecord.disabled = false;
            }
        }

        // 4. Download
        els.btnDownload.addEventListener('click', () => {
            const text = els.output.value.trim();
            if (!text) return;
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const lang = els.langSelect.value === 'pt' ? 'pt' : 'en';
            const date = new Date().toISOString().slice(0, 10);
            a.href = url;
            a.download = `transcricao_${lang}_${date}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // 🚀 Inicialização
        window.addEventListener('DOMContentLoaded', async () => {
            if (!navigator.mediaDevices?.getUserMedia) {
                els.status.textContent = '⛔ Gravação não suportada.';
                els.status.classList.add('error');
                els.btnRecord.disabled = true;
                return;
            }
            
            detectAndroid();
            
            if (isAndroid) {
                els.permissionSteps.innerHTML = getPermissionInstructions();
            }
            
            // Teste inicial silencioso de permissão
            try {
                await new Promise(r => setTimeout(r, 1000));
                const test = await navigator.mediaDevices.getUserMedia({ audio: true });
                test.getTracks().forEach(t => t.stop());
                micPermissionGranted = true;
                console.log('✅ Permissão obtida');
            } catch (e) {
                console.log('ℹ️ Permissão pendente');
            }
        });
    </script>
</body>
</html>
