<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Dashboard Pro - Multi-Data (Corrigido)</title>
    
    <!-- Bibliotecas Externas -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --secondary: #4f46e5;
            --accent: #ec4899;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #334155;
            --border: #e2e8f0;
            --success: #10b981;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header { text-align: center; margin-bottom: 30px; animation: fadeInDown 0.8s ease; }
        h1 { margin: 0; color: var(--secondary); }
        
        /* --- Upload Section --- */
        #upload-section { display: flex; justify-content: center; align-items: center; height: 60vh; }
        .drop-zone {
            width: 100%; max-width: 600px; padding: 50px;
            border: 3px dashed var(--border); border-radius: 20px;
            background: white; text-align: center; cursor: pointer; transition: var(--transition);
        }
        .drop-zone:hover { border-color: var(--primary); transform: scale(1.02); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        input[type="file"] { display: none; }

        /* --- Config Section --- */
        #config-section {
            display: none; background: var(--card-bg); padding: 30px;
            border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.5s ease;
        }

        .selection-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px; margin-top: 10px; max-height: 250px; overflow-y: auto;
            padding: 10px; border: 1px solid var(--border); border-radius: 8px;
        }

        .col-item {
            display: flex; align-items: center; padding: 10px 12px;
            background: #f1f5f9; border-radius: 6px; cursor: pointer;
            font-size: 14px; transition: 0.2s; border: 1px solid transparent;
        }

        .col-item:hover { background: #e2e8f0; }
        .col-item.checked { background: #eff6ff; border-color: var(--primary); color: var(--primary); font-weight: 600; }
        .col-item.disabled { opacity: 0.6; cursor: not-allowed; background: #f8fafc; }
        .col-item input { margin-right: 10px; accent-color: var(--primary); transform: scale(1.2); }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; padding: 15px 30px; border-radius: 8px;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;
            margin-top: 20px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }

        /* --- Dashboard --- */
        #dashboard-section { display: none; opacity: 0; transition: opacity 0.8s ease; }
        .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
        @media (max-width: 900px) { .charts-row { grid-template-columns: 1fr; } }

        .chart-card {
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; height: 450px;
        }

        /* --- Table --- */
        #details-section {
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-top: 20px; display: none; animation: slideUp 0.4s ease;
        }
        .table-responsive { overflow-x: auto; max-height: 400px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background-color: #f8fafc; position: sticky; top: 0; z-index: 10; }
        tr:hover { background-color: #f1f5f9; }

        /* --- Animations --- */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; color: white; margin-right: 5px; }
        .force-select { font-size: 10px; color: #64748b; margin-left: auto; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><i class="fas fa-chart-line"></i> Excel Analytics Pro</h1>
        <p style="color: #64748b;">Selecione múltiplas variáveis e gere gráficos mistos automaticamente</p>
    </header>

    <!-- 1. UPLOAD -->
    <section id="upload-section">
        <div class="drop-zone" id="dropZone">
            <i class="fas fa-file-excel" style="font-size: 50px; color: #16a34a; margin-bottom: 15px;"></i>
            <h3>Arraste seu arquivo Excel aqui</h3>
            <p>Suporta .xlsx, .xls, .csv</p>
            <input type="file" id="fileInput" accept=".xlsx, .xls, .csv">
        </div>
    </section>

    <!-- 2. CONFIGURAÇÃO -->
    <section id="config-section">
        <h2><i class="fas fa-cogs"></i> Configuração dos Dados</h2>
        <p>Selecione uma ou mais opções para compor o dashboard:</p>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
            <div>
                <label><strong>1. Dimensões (Eixo X / Legenda)</strong> <small>(Categorias)</small></label>
                <div id="label-columns" class="selection-grid"></div>
            </div>

            <div>
                <label><strong>2. Métricas (Valores Y)</strong> <small>(Números para plotar)</small></label>
                <div id="value-columns" class="selection-grid"></div>
            </div>
        </div>

        <button class="btn-primary" onclick="generateDashboard()">
            <i class="fas fa-rocket"></i> Gerar Dashboard Inteligente
        </button>
    </section>

    <!-- 3. DASHBOARD -->
    <section id="dashboard-section">
        <div style="margin-bottom: 20px; display: flex; justify-content: space-between;">
            <h2>Resultados</h2>
            <button onclick="resetApp()" style="padding: 8px 16px; background: #ef4444; color: white; border: none; border-radius: 6px; cursor: pointer;">
                <i class="fas fa-redo"></i> Reiniciar
            </button>
        </div>

        <div class="charts-row">
            <!-- Gráfico Principal (Misto se necessário) -->
            <div class="chart-card">
                <canvas id="mainChart"></canvas>
            </div>
            <!-- Gráfico de Distribuição -->
            <div class="chart-card">
                <canvas id="distChart"></canvas>
            </div>
        </div>

        <!-- Detalhes -->
        <div id="details-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin:0"><i class="fas fa-list"></i> Detalhamento</h3>
                <span id="filter-badge" class="badge" style="background: var(--secondary);"></span>
                <button onclick="document.getElementById('details-section').style.display='none'" style="border:none; background:transparent; cursor:pointer;"><i class="fas fa-times"></i></button>
            </div>
            <div class="table-responsive">
                <table id="data-table">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </section>
</div>

<script>
    // --- Estado Global ---
    let rawData = [];
    let headers = [];
    let selectedLabels = []; 
    let selectedValues = []; 
    let chartInstances = {};

    // --- Helpers de Cores ---
    const colors = [
        '#2563eb', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', 
        '#ec4899', '#06b6d4', '#f97316', '#6366f1', '#14b8a6'
    ];

    function getColor(index) {
        return colors[index % colors.length];
    }

    // --- Upload Logic ---
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#2563eb'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#e2e8f0'; });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#e2e8f0';
        if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) processFile(e.target.files[0]);
    });

    function processFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            
            // Convertendo com defval nulo para identificar células vazias
            rawData = XLSX.utils.sheet_to_json(firstSheet, { defval: null });
            
            if (!rawData.length) return alert("Arquivo vazio ou formato inválido");
            
            headers = Object.keys(rawData[0]);
            initConfig();
        };
        reader.readAsArrayBuffer(file);
    }

    // --- Configuração UI (Lógica Corrigida) ---
    function initConfig() {
        document.getElementById('upload-section').style.display = 'none';
        document.getElementById('config-section').style.display = 'block';

        const labelContainer = document.getElementById('label-columns');
        const valueContainer = document.getElementById('value-columns');

        headers.forEach(h => {
            // Verifica se é numérico olhando para as primeiras 10 linhas (para evitar erro com cabeçalhos sujos)
            let numericCount = 0;
            let checkLimit = Math.min(rawData.length, 20);
            
            for(let i=0; i<checkLimit; i++) {
                if (typeof rawData[i][h] === 'number') numericCount++;
            }
            
            // Considera numérico se mais de 50% das amostras forem números
            const isLikelyNumeric = numericCount > (checkLimit / 2);

            // Checkbox Label
            const lDiv = document.createElement('div');
            lDiv.className = 'col-item';
            lDiv.innerHTML = `<label style="width:100%; cursor:pointer; display:flex;"><input type="checkbox" value="${h}" class="chk-label"> ${h}</label>`;
            lDiv.onclick = (e) => { if(e.target.tagName !== 'INPUT') lDiv.querySelector('input').click(); toggleStyle(lDiv); };
            labelContainer.appendChild(lDiv);

            // Checkbox Value
            const vDiv = document.createElement('div');
            vDiv.className = `col-item ${!isLikelyNumeric ? 'disabled' : ''}`;
            
            // Adiciona ícone de alerta se for ambíguo
            const icon = !isLikelyNumeric ? '<i class="fas fa-exclamation-triangle force-select" title="Coluna pode conter texto"></i>' : '';
            
            vDiv.innerHTML = `
                <label style="width:100%; cursor:pointer; display:flex; align-items:center;">
                    <input type="checkbox" value="${h}" class="chk-value" ${!isLikelyNumeric ? 'disabled' : ''}> 
                    ${h} 
                    ${icon}
                </label>`;
            
            // Permite clicar mesmo se estiver "desabilitado visualmente" caso o usuário queça forçar (opcional, aqui mantive disabled mas mudei a logica de detecção)
            vDiv.onclick = (e) => { 
                if(e.target.tagName !== 'INPUT') {
                    const chk = vDiv.querySelector('input');
                    if(!chk.disabled) {
                        chk.click(); 
                        toggleStyle(vDiv);
                    }
                }
            };
            valueContainer.appendChild(vDiv);
        });
    }

    function toggleStyle(div) {
        const chk = div.querySelector('input');
        // Se o clique veio do próprio input, o estado já mudou. Se veio da div, mudamos agora.
        // Mas como o evento onclick da div dispara antes do change do input em alguns casos, vamos confiar no estado atual
        div.classList.toggle('checked', chk.checked);
    }

    // --- Lógica Principal do Dashboard ---
    function generateDashboard() {
        // Coletar seleções
        selectedLabels = Array.from(document.querySelectorAll('.chk-label:checked')).map(c => c.value);
        selectedValues = Array.from(document.querySelectorAll('.chk-value:checked')).map(c => c.value);

        if (selectedLabels.length === 0 || selectedValues.length === 0) {
            alert("Por favor, selecione pelo menos 1 coluna para Dimensão (X) e 1 para Valores (Y).");
            return;
        }

        // Usar a PRIMEIRA seleção de label como eixo X principal para agrupamento
        const primaryLabel = selectedLabels[0]; 

        // Transição de tela
        document.getElementById('config-section').style.display = 'none';
        const dash = document.getElementById('dashboard-section');
        dash.style.display = 'block';
        setTimeout(() => dash.style.opacity = 1, 10);

        renderCharts(primaryLabel);
    }

    function renderCharts(xAxisKey) {
        // 1. Processar Dados Agrupados
        const grouped = {};
        const labelsSet = new Set();

        rawData.forEach(row => {
            const key = row[xAxisKey];
            if (key === undefined || key === null) return; // Pula linhas sem chave
            
            const cleanKey = String(key).trim();
            labelsSet.add(cleanKey);
            
            if (!grouped[cleanKey]) grouped[cleanKey] = {};
            
            selectedValues.forEach(valKey => {
                if (!grouped[cleanKey][valKey]) grouped[cleanKey][valKey] = 0;
                // Tenta converter para float, se falhar soma 0
                let val = parseFloat(row[valKey]);
                if(isNaN(val)) val = 0;
                grouped[cleanKey][valKey] += val;
            });
        });

        const labels = Array.from(labelsSet);

        // 2. Preparar Datasets para Chart.js
        const mainDatasets = selectedValues.map((valKey, index) => {
            const color = getColor(index);
            // Lógica Mista: Se tiver muitas métricas (>2), alterna entre Barra e Linha
            const useLine = selectedValues.length > 2 && index % 2 !== 0; 
            
            return {
                label: valKey,
                data: labels.map(l => grouped[l][valKey] || 0),
                backgroundColor: useLine ? 'transparent' : color + 'CC', // Transparente se for linha
                borderColor: color,
                borderWidth: 2,
                type: useLine ? 'line' : 'bar', // Define o tipo do gráfico
                tension: 0.3,
                fill: false,
                pointRadius: useLine ? 4 : 0
            };
        });

        // Dataset para Gráfico de Pizza (Soma total ou apenas o primeiro valor selecionado)
        const pieData = labels.map(l => grouped[l][selectedValues[0]] || 0);
        const pieColors = labels.map((_, i) => getColor(i));

        // 3. Renderizar Main Chart (Misto)
        const ctxMain = document.getElementById('mainChart').getContext('2d');
        if (chartInstances.main) chartInstances.main.destroy();

        chartInstances.main = new Chart(ctxMain, {
            data: { labels: labels, datasets: mainDatasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    title: { display: true, text: `Análise Combinada: ${xAxisKey}` },
                    tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw.toLocaleString('pt-BR')}` } }
                },
                onClick: (e, elements) => handleChartClick(e, elements, xAxisKey, labels)
            }
        });

        // 4. Renderizar Distribution Chart (Pizza)
        const ctxDist = document.getElementById('distChart').getContext('2d');
        if (chartInstances.dist) chartInstances.dist.destroy();

        chartInstances.dist = new Chart(ctxDist, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: pieData,
                    backgroundColor: pieColors,
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: { display: true, text: `Distribuição: ${selectedValues[0]}` },
                    legend: { display: labels.length > 10 ? false : true } // Esconde legenda se poluir
                },
                onClick: (e, elements) => handleChartClick(e, elements, xAxisKey, labels)
            }
        });
    }

    // --- Interatividade (Drill-down) ---
    function handleChartClick(evt, elements, labelKey, allLabels) {
        if (elements.length === 0) return;
        
        // Identificar qual item foi clicado
        const index = elements[0].index;
        const clickedValue = allLabels[index];
        
        // Identificar qual dataset (métrica) foi clicada
        let metricInfo = "";
        if (elements[0].datasetIndex !== undefined) {
             const dsLabel = chartInstances.main.data.datasets[elements[0].datasetIndex].label;
             metricInfo = ` | Valor: <strong>${dsLabel}</strong>`;
        }

        showDetails(labelKey, clickedValue, metricInfo);
    }

    function showDetails(key, value, metricHtml) {
        const section = document.getElementById('details-section');
        const badge = document.getElementById('filter-badge');
        const tableHead = document.querySelector('#data-table thead');
        const tableBody = document.querySelector('#data-table tbody');

        section.style.display = 'block';
        section.scrollIntoView({ behavior: 'smooth' });

        badge.innerHTML = `${key}: "${value}" ${metricHtml}`;

        // Filtrar dados brutos
        const filtered = rawData.filter(row => String(row[key]).trim() == String(value).trim());

        // Montar Tabela
        tableHead.innerHTML = '';
        tableBody.innerHTML = '';

        if(filtered.length > 0) {
            // Header
            const trH = document.createElement('tr');
            Object.keys(filtered[0]).forEach(k => {
                const th = document.createElement('th');
                th.innerText = k;
                trH.appendChild(th);
            });
            tableHead.appendChild(trH);

            // Body (Max 100 rows para performance)
            filtered.slice(0, 100).forEach(row => {
                const tr = document.createElement('tr');
                Object.values(row).forEach(v => {
                    const td = document.createElement('td');
                    td.innerText = v !== null ? v : '';
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });
            
            if(filtered.length > 100) {
                 const tr = document.createElement('tr');
                 tr.innerHTML = `<td colspan="${Object.keys(filtered[0]).length}" style="text-align:center; color:#888;">... exibindo 100 de ${filtered.length} registros ...</td>`;
                 tableBody.appendChild(tr);
            }
        } else {
            tableBody.innerHTML = '<tr><td>Nenhum dado encontrado para esta seleção.</td></tr>';
        }
    }

    function resetApp() {
        location.reload();
    }
</script>

</body>
</html>
